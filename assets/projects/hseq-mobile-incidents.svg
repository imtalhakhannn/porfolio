<svg xmlns="http://www.w3.org/2000/svg" width="400" height="780" viewBox="0 0 400 780">
  <defs>
    <clipPath id="phoneClip2"><rect x="24" y="12" width="352" height="756" rx="36"/></clipPath>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Phone Frame -->
  <rect x="16" y="4" width="368" height="772" rx="40" fill="#1A1A2E" stroke="#333355" stroke-width="2"/>
  <rect x="24" y="12" width="352" height="756" rx="36" fill="#0D1117"/>

  <g clip-path="url(#phoneClip2)">
    <!-- Status Bar -->
    <rect x="24" y="12" width="352" height="44" fill="#0D1117"/>
    <text x="52" y="38" fill="#E2E8F0" font-size="12" font-weight="600">9:41</text>
    <rect x="310" y="28" width="22" height="10" rx="2" fill="none" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="312" y="30" width="16" height="6" rx="1" fill="#22C55E"/>
    <rect x="332" y="31" width="2" height="4" rx="1" fill="#E2E8F0"/>
    <rect x="152" y="16" width="96" height="24" rx="12" fill="#000"/>

    <!-- Header -->
    <rect x="24" y="56" width="352" height="56" fill="#0D1117"/>
    <!-- Back arrow -->
    <path d="M52 82 l-8 0 l4 -5 m-4 5 l4 5" fill="none" stroke="#E2E8F0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="200" y="89" fill="#E2E8F0" font-size="18" font-weight="700" text-anchor="middle">Incidents</text>
    <!-- Plus icon -->
    <circle cx="340" cy="82" r="14" fill="#14532D"/>
    <line x1="334" y1="82" x2="346" y2="82" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
    <line x1="340" y1="76" x2="340" y2="88" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>

    <!-- Search Bar -->
    <rect x="40" y="120" width="320" height="42" rx="12" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <circle cx="62" cy="141" r="8" fill="none" stroke="#475569" stroke-width="1.5"/>
    <line x1="68" y1="147" x2="72" y2="151" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <text x="80" y="146" fill="#475569" font-size="13">Search incidents...</text>

    <!-- Filter Chips -->
    <rect x="40" y="174" width="46" height="28" rx="14" fill="#14532D" stroke="#22C55E" stroke-width="1"/>
    <text x="63" y="192" fill="#22C55E" font-size="11" font-weight="600" text-anchor="middle">All</text>

    <rect x="94" y="174" width="56" height="28" rx="14" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <text x="122" y="192" fill="#94A3B8" font-size="11" font-weight="500" text-anchor="middle">Open</text>

    <rect x="158" y="174" width="72" height="28" rx="14" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <text x="194" y="192" fill="#94A3B8" font-size="11" font-weight="500" text-anchor="middle">In Review</text>

    <rect x="238" y="174" width="64" height="28" rx="14" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <text x="270" y="192" fill="#94A3B8" font-size="11" font-weight="500" text-anchor="middle">Closed</text>

    <!-- Results count -->
    <text x="48" y="226" fill="#64748B" font-size="11">11 incidents found</text>

    <!-- Incident Card 1 -->
    <rect x="40" y="240" width="320" height="108" rx="12" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <text x="56" y="266" fill="#F1F5F9" font-size="14" font-weight="600">Chemical spill in Lab 3</text>
    <rect x="270" y="252" width="48" height="20" rx="10" fill="#7F1D1D"/>
    <text x="294" y="266" fill="#FCA5A5" font-size="10" font-weight="700" text-anchor="middle">High</text>
    <text x="56" y="288" fill="#94A3B8" font-size="11">Hazardous material leak detected near storage</text>
    <text x="56" y="306" fill="#94A3B8" font-size="11">area. Containment protocol initiated.</text>
    <!-- Meta info -->
    <circle cx="62" cy="332" r="4" fill="#EF4444"/>
    <text x="72" y="336" fill="#64748B" font-size="10">Open</text>
    <text x="114" y="336" fill="#475569" font-size="10">|</text>
    <text x="126" y="336" fill="#64748B" font-size="10">Apr 12, 2026</text>
    <text x="210" y="336" fill="#475569" font-size="10">|</text>
    <text x="222" y="336" fill="#64748B" font-size="10">INC-2026-047</text>

    <!-- Incident Card 2 -->
    <rect x="40" y="360" width="320" height="108" rx="12" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <text x="56" y="386" fill="#F1F5F9" font-size="14" font-weight="600">Forklift near-miss event</text>
    <rect x="256" y="372" width="64" height="20" rx="10" fill="#78350F"/>
    <text x="288" y="386" fill="#FCD34D" font-size="10" font-weight="700" text-anchor="middle">Medium</text>
    <text x="56" y="408" fill="#94A3B8" font-size="11">Near-miss reported between forklift and</text>
    <text x="56" y="426" fill="#94A3B8" font-size="11">pedestrian worker at loading dock.</text>
    <circle cx="62" cy="452" r="4" fill="#F59E0B"/>
    <text x="72" y="456" fill="#64748B" font-size="10">In Review</text>
    <text x="130" y="456" fill="#475569" font-size="10">|</text>
    <text x="142" y="456" fill="#64748B" font-size="10">Apr 11, 2026</text>
    <text x="226" y="456" fill="#475569" font-size="10">|</text>
    <text x="238" y="456" fill="#64748B" font-size="10">INC-2026-046</text>

    <!-- Incident Card 3 -->
    <rect x="40" y="480" width="320" height="108" rx="12" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <text x="56" y="506" fill="#F1F5F9" font-size="14" font-weight="600">PPE compliance failure</text>
    <rect x="270" y="492" width="48" height="20" rx="10" fill="#7F1D1D"/>
    <text x="294" y="506" fill="#FCA5A5" font-size="10" font-weight="700" text-anchor="middle">High</text>
    <text x="56" y="528" fill="#94A3B8" font-size="11">Workers observed without required safety</text>
    <text x="56" y="546" fill="#94A3B8" font-size="11">helmets in construction zone B.</text>
    <circle cx="62" cy="572" r="4" fill="#EF4444"/>
    <text x="72" y="576" fill="#64748B" font-size="10">Open</text>
    <text x="114" y="576" fill="#475569" font-size="10">|</text>
    <text x="126" y="576" fill="#64748B" font-size="10">Apr 10, 2026</text>
    <text x="210" y="576" fill="#475569" font-size="10">|</text>
    <text x="222" y="576" fill="#64748B" font-size="10">INC-2026-045</text>

    <!-- Incident Card 4 -->
    <rect x="40" y="600" width="320" height="108" rx="12" fill="#1B1B30" stroke="#2D2D50" stroke-width="1"/>
    <text x="56" y="626" fill="#F1F5F9" font-size="14" font-weight="600">Fire drill evacuation delay</text>
    <rect x="270" y="612" width="48" height="20" rx="10" fill="#1E3A5F"/>
    <text x="294" y="626" fill="#93C5FD" font-size="10" font-weight="700" text-anchor="middle">Low</text>
    <text x="56" y="648" fill="#94A3B8" font-size="11">Building C evacuation took 8 min vs</text>
    <text x="56" y="666" fill="#94A3B8" font-size="11">target of 5 min. Training recommended.</text>
    <circle cx="62" cy="692" r="4" fill="#22C55E"/>
    <text x="72" y="696" fill="#64748B" font-size="10">Closed</text>
    <text x="120" y="696" fill="#475569" font-size="10">|</text>
    <text x="132" y="696" fill="#64748B" font-size="10">Apr 9, 2026</text>
    <text x="210" y="696" fill="#475569" font-size="10">|</text>
    <text x="222" y="696" fill="#64748B" font-size="10">INC-2026-044</text>

    <!-- Bottom Navigation -->
    <rect x="24" y="714" width="352" height="54" fill="#0D1117" stroke="#1E293B" stroke-width="1"/>

    <!-- Home -->
    <g transform="translate(68, 724)" opacity="0.5">
      <rect x="3" y="2" width="12" height="10" rx="1" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
      <path d="M0 12 L9 4 L18 12" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="9" y="30" fill="#94A3B8" font-size="9" text-anchor="middle">Home</text>
    </g>

    <!-- Incidents (active) -->
    <g transform="translate(148, 724)">
      <circle cx="9" cy="10" r="8" fill="none" stroke="#22C55E" stroke-width="1.5"/>
      <text x="9" y="14" fill="#22C55E" font-size="10" font-weight="700" text-anchor="middle">!</text>
      <text x="9" y="30" fill="#22C55E" font-size="9" font-weight="600" text-anchor="middle">Incidents</text>
    </g>

    <!-- Tasks -->
    <g transform="translate(228, 724)" opacity="0.5">
      <rect x="1" y="3" width="14" height="14" rx="3" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
      <path d="M4 10 l3 3 l5 -6" fill="none" stroke="#94A3B8" stroke-width="1.3" stroke-linecap="round"/>
      <text x="9" y="30" fill="#94A3B8" font-size="9" text-anchor="middle">Tasks</text>
    </g>

    <!-- Profile -->
    <g transform="translate(308, 724)" opacity="0.5">
      <circle cx="9" cy="7" r="5" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
      <path d="M0 18 a9 7 0 0 1 18 0" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
      <text x="9" y="30" fill="#94A3B8" font-size="9" text-anchor="middle">Profile</text>
    </g>
  </g>
</svg>