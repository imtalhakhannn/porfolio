<svg xmlns="http://www.w3.org/2000/svg" width="400" height="780" viewBox="0 0 400 780">
  <defs>
    <filter id="shadow1" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow2" x="-6%" y="-6%" width="112%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="phoneShadow" x="-5%" y="-2%" width="110%" height="104%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4C1D95" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="featuredGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="navGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <clipPath id="phoneClip">
      <rect x="16" y="16" width="368" height="748" rx="36"/>
    </clipPath>
  </defs>

  <!-- Phone Frame -->
  <rect x="8" y="8" width="384" height="764" rx="40" fill="#1F2937" filter="url(#phoneShadow)"/>
  <rect x="12" y="12" width="376" height="756" rx="38" fill="#2D3748"/>
  <rect x="16" y="16" width="368" height="748" rx="36" fill="#F5F3FF"/>

  <!-- Content clipped to phone -->
  <g clip-path="url(#phoneClip)">

    <!-- Status Bar -->
    <rect x="16" y="16" width="368" height="44" fill="#fff"/>
    <text x="40" y="42" fill="#1F2937" font-family="system-ui, sans-serif" font-size="12" font-weight="600">9:41</text>
    <!-- Signal bars -->
    <rect x="310" y="32" width="3" height="6" rx="1" fill="#1F2937"/>
    <rect x="316" y="30" width="3" height="8" rx="1" fill="#1F2937"/>
    <rect x="322" y="28" width="3" height="10" rx="1" fill="#1F2937"/>
    <rect x="328" y="26" width="3" height="12" rx="1" fill="#1F2937"/>
    <!-- WiFi -->
    <path d="M342,36 Q348,28 354,36" fill="none" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M345,33 Q348,30 351,33" fill="none" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Battery -->
    <rect x="362" y="30" width="16" height="9" rx="2" fill="none" stroke="#1F2937" stroke-width="1.2"/>
    <rect x="364" y="32" width="11" height="5" rx="1" fill="#34D399"/>

    <!-- App Header -->
    <rect x="16" y="56" width="368" height="56" fill="#fff"/>
    <!-- Book + sparkle logo -->
    <rect x="36" y="70" width="18" height="22" rx="3" fill="#8B5CF6"/>
    <rect x="34" y="72" width="18" height="22" rx="3" fill="#A78BFA"/>
    <circle cx="54" cy="70" r="4" fill="#F59E0B"/>
    <line x1="54" y1="64" x2="54" y2="76" stroke="#F59E0B" stroke-width="1" stroke-linecap="round"/>
    <line x1="48" y1="70" x2="60" y2="70" stroke="#F59E0B" stroke-width="1" stroke-linecap="round"/>
    <text x="68" y="87" fill="#4C1D95" font-family="system-ui, sans-serif" font-size="20" font-weight="800">Little Author</text>

    <!-- Notification + Avatar -->
    <circle cx="340" cy="82" r="14" fill="#F5F3FF"/>
    <path d="M336,84 L340,78 L344,84" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="335" y1="84" x2="345" y2="84" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="344" cy="78" r="2.5" fill="#EC4899"/>

    <circle cx="370" cy="82" r="14" fill="#F59E0B"/>
    <circle cx="370" cy="78" r="4.5" fill="#FEF3C7"/>
    <path d="M363,90 Q370,85 377,90" fill="#FEF3C7"/>

    <line x1="36" y1="112" x2="364" y2="112" stroke="#F3F4F6" stroke-width="1"/>

    <!-- Featured Story Card -->
    <rect x="32" y="124" width="336" height="200" rx="24" fill="url(#featuredGrad)" filter="url(#shadow2)"/>
    <!-- Decorative elements -->
    <circle cx="320" cy="160" r="40" fill="rgba(255,255,255,0.1)"/>
    <circle cx="340" cy="200" r="60" fill="rgba(255,255,255,0.06)"/>
    <circle cx="80" cy="280" r="30" fill="rgba(255,255,255,0.08)"/>
    <!-- Stars -->
    <circle cx="300" cy="150" r="3" fill="rgba(255,255,255,0.5)"/>
    <circle cx="280" cy="170" r="2" fill="rgba(255,255,255,0.4)"/>
    <circle cx="330" cy="180" r="2.5" fill="rgba(255,255,255,0.45)"/>
    <circle cx="100" cy="155" r="2" fill="rgba(255,255,255,0.4)"/>
    <circle cx="120" cy="140" r="1.5" fill="rgba(255,255,255,0.35)"/>

    <!-- Big star illustration -->
    <polygon points="200,150 208,172 232,172 213,185 220,208 200,195 180,208 187,185 168,172 192,172" fill="rgba(255,255,255,0.25)"/>
    <polygon points="200,158 205,170 218,170 207,178 211,192 200,184 189,192 193,178 182,170 195,170" fill="rgba(255,255,255,0.2)"/>

    <text x="56" y="260" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.8">CONTINUE YOUR ADVENTURE</text>
    <text x="56" y="284" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">The Brave Little Star</text>

    <!-- Continue Reading button -->
    <rect x="56" y="296" width="160" height="36" rx="18" fill="#fff"/>
    <text x="136" y="318" text-anchor="middle" fill="#8B5CF6" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Continue Reading</text>
    <!-- Arrow -->
    <path d="M190,311 L198,311 M195,307 L199,311 L195,315" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Progress -->
    <rect x="240" y="304" width="108" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
    <rect x="240" y="304" width="70" height="6" rx="3" fill="#fff"/>
    <text x="240" y="322" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="9">65% complete</text>

    <!-- My Library Section -->
    <text x="36" y="358" fill="#4C1D95" font-family="system-ui, sans-serif" font-size="18" font-weight="700">My Library</text>
    <text x="340" y="358" fill="#8B5CF6" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="end">See All</text>

    <!-- Book Grid 2x2 -->
    <!-- Book 1: Mint -->
    <rect x="32" y="374" width="160" height="180" rx="18" fill="#fff" filter="url(#shadow1)"/>
    <rect x="42" y="384" width="140" height="105" rx="14" fill="#D1FAE5"/>
    <!-- Tree icon -->
    <circle cx="112" cy="420" r="20" fill="#34D399" opacity="0.5"/>
    <circle cx="112" cy="410" r="15" fill="#6EE7B7" opacity="0.5"/>
    <rect x="109" y="430" width="6" height="14" rx="2" fill="#92400E" opacity="0.4"/>
    <text x="112" y="450" text-anchor="middle" fill="#065F46" font-family="system-ui, sans-serif" font-size="12" font-weight="700" opacity="0.7">🌿</text>
    <text x="52" y="510" fill="#1F2937" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Enchanted Woods</text>
    <text x="52" y="526" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">8 pages</text>
    <!-- Stars -->
    <text x="52" y="545" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="11">★ ★ ★ ★ ★</text>

    <!-- Book 2: Lavender -->
    <rect x="208" y="374" width="160" height="180" rx="18" fill="#fff" filter="url(#shadow1)"/>
    <rect x="218" y="384" width="140" height="105" rx="14" fill="#EDE9FE"/>
    <!-- Moon icon -->
    <circle cx="288" cy="426" r="18" fill="#A78BFA" opacity="0.5"/>
    <circle cx="296" cy="420" r="14" fill="#EDE9FE"/>
    <circle cx="270" cy="410" r="2" fill="#DDD6FE"/>
    <circle cx="260" cy="430" r="1.5" fill="#DDD6FE"/>
    <circle cx="310" cy="440" r="2" fill="#DDD6FE"/>
    <text x="228" y="510" fill="#1F2937" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Moonlight Dance</text>
    <text x="228" y="526" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">6 pages</text>
    <text x="228" y="545" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="11">★ ★ ★ ★ ☆</text>

    <!-- Book 3: Peach -->
    <rect x="32" y="566" width="160" height="180" rx="18" fill="#fff" filter="url(#shadow1)"/>
    <rect x="42" y="576" width="140" height="105" rx="14" fill="#FEE2E2"/>
    <!-- Heart / love theme -->
    <path d="M90,620 Q90,605 105,605 Q120,605 112,620 Q112,605 127,605 Q142,605 142,620 Q142,640 112,655 Q82,640 90,620 Z" fill="#FCA5A5" opacity="0.5" transform="scale(0.7) translate(50 -30)"/>
    <text x="52" y="702" fill="#1F2937" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Petal the Puppy</text>
    <text x="52" y="718" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">10 pages</text>
    <text x="52" y="737" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="11">★ ★ ★ ★ ★</text>

    <!-- Book 4: Sky Blue -->
    <rect x="208" y="566" width="160" height="180" rx="18" fill="#fff" filter="url(#shadow1)"/>
    <rect x="218" y="576" width="140" height="105" rx="14" fill="#DBEAFE"/>
    <!-- Cloud -->
    <ellipse cx="288" cy="628" rx="22" ry="14" fill="#93C5FD" opacity="0.5"/>
    <ellipse cx="275" cy="624" rx="15" ry="11" fill="#BFDBFE" opacity="0.5"/>
    <ellipse cx="300" cy="626" rx="12" ry="9" fill="#BFDBFE" opacity="0.5"/>
    <!-- Rainbow -->
    <path d="M250,650 Q270,620 310,650" fill="none" stroke="#F87171" stroke-width="2" opacity="0.4"/>
    <path d="M253,652 Q273,625 313,652" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0.4"/>
    <path d="M256,654 Q276,630 316,654" fill="none" stroke="#34D399" stroke-width="2" opacity="0.4"/>
    <text x="228" y="702" fill="#1F2937" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Cloud Kingdom</text>
    <text x="228" y="718" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="10">5 pages</text>
    <text x="228" y="737" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="11">★ ★ ★ ☆ ☆</text>

  </g>

  <!-- Bottom Navigation (on top of clip) -->
  <rect x="16" y="700" width="368" height="64" fill="url(#navGrad)" rx="0"/>
  <line x1="16" y1="700" x2="384" y2="700" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Home (active) -->
  <circle cx="62" cy="718" r="9" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
  <rect x="58" y="714" width="8" height="5" rx="1" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="62" y="742" text-anchor="middle" fill="#8B5CF6" font-family="system-ui, sans-serif" font-size="9" font-weight="700">Home</text>
  <!-- Active dot -->
  <circle cx="62" cy="752" r="2.5" fill="#8B5CF6"/>

  <!-- Create -->
  <circle cx="154" cy="718" r="9" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="154" y1="713" x2="154" y2="723" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="149" y1="718" x2="159" y2="718" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <text x="154" y="742" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Create</text>

  <!-- Library -->
  <rect x="238" y="710" width="12" height="14" rx="2" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="236" y="712" width="12" height="14" rx="2" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="246" y="742" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Library</text>

  <!-- Profile -->
  <circle cx="338" cy="714" r="5" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <path d="M330,726 Q338,720 346,726" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="338" y="742" text-anchor="middle" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Profile</text>

  <!-- Home indicator bar -->
  <rect x="160" y="756" width="80" height="4" rx="2" fill="#1F2937" opacity="0.2"/>

  <!-- Notch -->
  <rect x="150" y="18" width="100" height="24" rx="12" fill="#1F2937"/>
  <circle cx="210" cy="30" r="5" fill="#2D3748"/>
</svg>