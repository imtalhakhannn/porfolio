    <text x="640" y="478" fill="#94A3B8" font-size="12">245 / 245</text>
    <rect x="770" y="466" width="68" height="20" rx="10" fill="#052E16"/>
    <text x="804" y="480" fill="#22C55E" font-size="10" font-weight="600" text-anchor="middle">Completed</text>
    <text x="870" y="478" fill="#22C55E" font-size="12">100%</text>
    <line x1="268" y1="492" x2="920" y2="492" stroke="#1E293B" stroke-width="1"/>

