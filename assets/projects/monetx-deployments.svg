<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <clipPath id="roundClip2"><rect width="960" height="600" rx="8"/></clipPath>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
