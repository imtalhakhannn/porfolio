    <text x="274" y="514" fill="#CBD5E1" font-size="12" font-weight="500">KB5033375 - .NET Framework</text>
    <text x="510" y="514" fill="#94A3B8" font-size="12">Apr 8, 2026</text>
    <text x="640" y="514" fill="#94A3B8" font-size="12">118 / 120</text>
    <rect x="770" y="502" width="68" height="20" rx="10" fill="#052E16"/>
