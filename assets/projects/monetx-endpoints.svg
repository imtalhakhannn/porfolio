      <rect x="31" y="96" width="5" height="5" rx="1" fill="#94A3B8"/>
      <rect x="38" y="96" width="5" height="5" rx="1" fill="#94A3B8"/>
      <rect x="31" y="103" width="5" height="5" rx="1" fill="#94A3B8"/>
