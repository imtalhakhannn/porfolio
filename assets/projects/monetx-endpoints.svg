    <text x="274" y="446" fill="#E2E8F0" font-size="13" font-weight="500">PROD-CACHE-01</text>
    <text x="430" y="446" fill="#94A3B8" font-size="13">10.0.1.200</text>
    <text x="572" y="446" fill="#94A3B8" font-size="13">Debian 12</text>
    <rect x="700" y="433" width="60" height="22" rx="11" fill="#052E16"/>
    <text x="730" y="448" fill="#22C55E" font-size="11" font-weight="600" text-anchor="middle">Online</text>
