    <text x="68" y="42" fill="#F1F5F9" font-size="17" font-weight="700">MonetX</text>
    <line x1="16" y1="68" x2="204" y2="68" stroke="#334155" stroke-width="1"/>

    <!-- Nav Items -->
    <!-- Dashboard -->
    <g opacity="0.55">
