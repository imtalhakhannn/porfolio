<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <filter id="shadow1" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="book1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="book2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="book3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" fill="#F5F3FF" rx="12"/>

  <!-- Sidebar -->
  <rect width="200" height="600" fill="url(#sidebarGrad)" rx="12"/>
  <rect x="200" y="0" width="12" height="600" fill="url(#sidebarGrad)"/>

  <!-- Sidebar Logo -->
  <text x="100" y="42" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Little Author</text>
  <text x="100" y="58" text-anchor="middle" fill="#DDD6FE" font-family="system-ui, sans-serif" font-size="10">AI Storybook App</text>
  <line x1="24" y1="70" x2="176" y2="70" stroke="#A78BFA" stroke-width="1"/>

  <!-- Sidebar Nav Items -->
  <!-- Home (active) -->
  <rect x="12" y="84" width="176" height="40" rx="12" fill="rgba(255,255,255,0.2)"/>
  <circle cx="40" cy="104" r="9" fill="none" stroke="#fff" stroke-width="1.5"/>
  <rect x="36" y="100" width="8" height="5" rx="1" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="60" y="109" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Home</text>

  <!-- My Stories -->
  <rect x="36" y="142" width="10" height="12" rx="2" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="34" y="144" width="10" height="12" rx="2" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="60" y="155" fill="#DDD6FE" font-family="system-ui, sans-serif" font-size="13">My Stories</text>

  <!-- Create Story -->
  <circle cx="40" cy="180" r="8" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <line x1="40" y1="175" x2="40" y2="185" stroke="#DDD6FE" stroke-width="1.5"/>
  <line x1="35" y1="180" x2="45" y2="180" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="60" y="185" fill="#DDD6FE" font-family="system-ui, sans-serif" font-size="13">Create Story</text>

  <!-- Characters -->
  <circle cx="40" cy="214" r="5" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <path d="M30,226 Q40,220 50,226" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="60" y="220" fill="#DDD6FE" font-family="system-ui, sans-serif" font-size="13">Characters</text>

  <!-- Progress -->
  <rect x="32" y="245" width="16" height="12" rx="2" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <line x1="35" y1="250" x2="42" y2="250" stroke="#DDD6FE" stroke-width="1.5"/>
  <line x1="35" y1="253" x2="45" y2="253" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="60" y="256" fill="#DDD6FE" font-family="system-ui, sans-serif" font-size="13">Progress</text>

  <!-- Settings -->
  <circle cx="40" cy="286" r="7" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <circle cx="40" cy="286" r="3" fill="none" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="60" y="291" fill="#DDD6FE" font-family="system-ui, sans-serif" font-size="13">Settings</text>

  <!-- Top Header Bar -->
  <rect x="212" y="8" width="736" height="56" rx="16" fill="#fff" filter="url(#shadow1)"/>
  <text x="232" y="42" fill="#4C1D95" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Welcome back, Sarah!</text>
  <text x="232" y="28" fill="#8B5CF6" font-family="system-ui, sans-serif" font-size="11">Sunday morning</text>

  <!-- Avatar -->
  <circle cx="912" cy="36" r="20" fill="#F59E0B"/>
  <circle cx="912" cy="30" r="7" fill="#fff"/>
  <path d="M900,46 Q912,38 924,46" fill="#fff"/>
  <circle cx="912" cy="36" r="20" fill="none" stroke="#FDE68A" stroke-width="2"/>

  <!-- Notification bell -->
  <circle cx="866" cy="36" r="16" fill="#F5F3FF"/>
  <path d="M862,38 L866,32 L870,38" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="860" y1="38" x2="872" y2="38" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="870" cy="32" r="3" fill="#EC4899"/>

  <!-- Stat Cards Row -->
  <!-- Card 1: Stories Created -->
  <rect x="220" y="78" width="170" height="100" rx="16" fill="url(#card1)" filter="url(#shadow2)"/>
  <circle cx="248" cy="104" r="16" fill="rgba(255,255,255,0.25)"/>
  <rect x="241" y="98" width="10" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
  <line x1="244" y1="102" x2="249" y2="102" stroke="#fff" stroke-width="1"/>
  <line x1="244" y1="105" x2="248" y2="105" stroke="#fff" stroke-width="1"/>
  <text x="236" y="148" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="800">12</text>
  <text x="236" y="164" fill="rgba(255,255,255,0.85)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Stories Created</text>

  <!-- Card 2: Characters Made -->
  <rect x="400" y="78" width="170" height="100" rx="16" fill="url(#card2)" filter="url(#shadow2)"/>
  <circle cx="428" cy="104" r="16" fill="rgba(255,255,255,0.25)"/>
  <circle cx="428" cy="100" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
  <path d="M420,112 Q428,106 436,112" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="416" y="148" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="800">8</text>
  <text x="416" y="164" fill="rgba(255,255,255,0.85)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Characters Made</text>

  <!-- Card 3: Words Written -->
  <rect x="580" y="78" width="170" height="100" rx="16" fill="url(#card3)" filter="url(#shadow2)"/>
  <circle cx="608" cy="104" r="16" fill="rgba(255,255,255,0.25)"/>
  <text x="608" y="108" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Aa</text>
  <text x="596" y="148" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="800">2,450</text>
  <text x="596" y="164" fill="rgba(255,255,255,0.85)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Words Written</text>

  <!-- Card 4: Reading Time -->
  <rect x="760" y="78" width="170" height="100" rx="16" fill="url(#card4)" filter="url(#shadow2)"/>
  <circle cx="788" cy="104" r="16" fill="rgba(255,255,255,0.25)"/>
  <circle cx="788" cy="104" r="7" fill="none" stroke="#fff" stroke-width="1.5"/>
  <line x1="788" y1="104" x2="788" y2="99" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="788" y1="104" x2="792" y2="106" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="776" y="148" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="800">5.2</text>
  <text x="820" y="148" fill="rgba(255,255,255,0.85)" font-family="system-ui, sans-serif" font-size="14" font-weight="500">hrs</text>
  <text x="776" y="164" fill="rgba(255,255,255,0.85)" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Reading Time</text>

