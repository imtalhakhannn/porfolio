  <text x="880" y="210" fill="#8B5CF6" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="end">View All</text>

  <!-- Book Card 1: The Magic Forest -->
  <rect x="220" y="224" width="226" height="350" rx="20" fill="#fff" filter="url(#shadow2)"/>
  <rect x="232" y="236" width="202" height="200" rx="14" fill="url(#book1bg)"/>
  <!-- Forest illustration -->
  <circle cx="290" cy="340" r="30" fill="#059669" opacity="0.6"/>
  <circle cx="330" cy="330" r="36" fill="#047857" opacity="0.5"/>
  <circle cx="370" cy="340" r="28" fill="#059669" opacity="0.6"/>
  <rect x="286" y="340" width="8" height="30" rx="2" fill="#92400E" opacity="0.5"/>
  <rect x="326" y="330" width="8" height="40" rx="2" fill="#92400E" opacity="0.5"/>
  <rect x="366" y="340" width="8" height="25" rx="2" fill="#92400E" opacity="0.5"/>
  <!-- Stars -->
  <circle cx="300" cy="270" r="3" fill="#FDE68A"/>
  <circle cx="360" cy="260" r="2" fill="#FDE68A"/>
  <circle cx="340" cy="280" r="2.5" fill="#FDE68A"/>
  <text x="333" y="310" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" opacity="0.9">The Magic</text>
  <text x="333" y="328" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" opacity="0.9">Forest</text>

  <text x="244" y="460" fill="#1F2937" font-family="system-ui, sans-serif" font-size="15" font-weight="700">The Magic Forest</text>
  <text x="244" y="478" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">12 pages  |  Fantasy</text>
  <!-- Progress bar -->
  <rect x="244" y="492" width="190" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="244" y="492" width="142" height="8" rx="4" fill="#8B5CF6"/>
  <text x="244" y="514" fill="#8B5CF6" font-family="system-ui, sans-serif" font-size="11" font-weight="600">75% complete</text>

  <!-- Book Card 2: Space Adventures -->
  <rect x="460" y="224" width="226" height="350" rx="20" fill="#fff" filter="url(#shadow2)"/>
  <rect x="472" y="236" width="202" height="200" rx="14" fill="url(#book2bg)"/>
  <!-- Space illustration -->
  <circle cx="573" cy="320" r="24" fill="#1E40AF" opacity="0.5"/>
  <circle cx="573" cy="320" r="16" fill="#3B82F6" opacity="0.4"/>
  <circle cx="530" cy="290" r="4" fill="#FDE68A"/>
  <circle cx="550" cy="360" r="3" fill="#FDE68A"/>
  <circle cx="600" cy="280" r="2.5" fill="#FDE68A"/>
  <circle cx="510" cy="340" r="2" fill="#FDE68A"/>
  <circle cx="620" cy="310" r="3" fill="#FDE68A"/>
  <circle cx="490" cy="300" r="1.5" fill="#FDE68A"/>
  <!-- Rocket -->
  <path d="M555,290 L560,270 L565,290 Z" fill="#F59E0B" opacity="0.8"/>
  <rect x="557" y="290" width="6" height="10" rx="2" fill="#EF4444" opacity="0.7"/>
  <text x="573" y="310" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" opacity="0.9">Space</text>
  <text x="573" y="328" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" opacity="0.9">Adventures</text>

  <text x="484" y="460" fill="#1F2937" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Space Adventures</text>
  <text x="484" y="478" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">8 pages  |  Sci-Fi</text>
  <!-- Progress bar -->
  <rect x="484" y="492" width="190" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="484" y="492" width="76" height="8" rx="4" fill="#F59E0B"/>
  <text x="484" y="514" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="11" font-weight="600">40% complete</text>

  <!-- Book Card 3: Ocean Friends -->
  <rect x="700" y="224" width="226" height="350" rx="20" fill="#fff" filter="url(#shadow2)"/>
  <rect x="712" y="236" width="202" height="200" rx="14" fill="url(#book3bg)"/>
  <!-- Ocean illustration -->
  <path d="M720,340 Q760,320 800,340 Q840,360 880,340 L900,340 L900,420 L720,420 Z" fill="#3B82F6" opacity="0.25"/>
  <path d="M720,360 Q760,340 800,360 Q840,380 880,360 L900,360 L900,420 L720,420 Z" fill="#3B82F6" opacity="0.2"/>
  <!-- Fish -->
  <ellipse cx="780" cy="330" rx="14" ry="8" fill="#F59E0B" opacity="0.7"/>
  <polygon points="795,330 805,322 805,338" fill="#F59E0B" opacity="0.7"/>
  <circle cx="775" cy="328" r="2" fill="#fff"/>
  <!-- Bubbles -->
  <circle cx="800" cy="290" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="810" cy="280" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="795" cy="275" r="2" fill="rgba(255,255,255,0.3)"/>
  <text x="813" y="310" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" opacity="0.9">Ocean</text>
  <text x="813" y="328" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" opacity="0.9">Friends</text>

  <text x="724" y="460" fill="#1F2937" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Ocean Friends</text>
  <text x="724" y="478" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="11">10 pages  |  Adventure</text>
  <!-- Progress bar -->
  <rect x="724" y="492" width="190" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="724" y="492" width="171" height="8" rx="4" fill="#EC4899"/>
  <text x="724" y="514" fill="#EC4899" font-family="system-ui, sans-serif" font-size="11" font-weight="600">90% complete</text>
</svg>