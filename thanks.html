<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Talha Khan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;">
        <div>
            <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#059669,#34D399);display:inline-flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 8px 30px rgba(5,150,105,0.3);">
                <i class="fas fa-check" style="font-size:2rem;color:#fff;"></i>
            </div>
            <h1 style="font-family:'Space Grotesk',sans-serif;font-size:2.5rem;margin-bottom:16px;">Message Sent!</h1>
            <p style="color:var(--text-muted);font-size:1.1rem;max-width:450px;margin:0 auto 36px;">Thank you for reaching out. I'll get back to you as soon as possible.</p>
            <a href="index.html" class="btn btn-primary">
                <span>Back to Portfolio</span>
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
    </div>

</html>
